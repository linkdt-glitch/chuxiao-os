services:
  - type: web
    name: chuxiao-os
    runtime: node
    plan: starter
    buildCommand: npm ci && npm run build
    startCommand: npm run start -- -H 0.0.0.0 -p $PORT
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: NEXT_PUBLIC_ENABLE_DEMO_MODE
        value: false
      - key: AUTH_REQUIRE_INVITE
        value: true
      - key: AUTH_ALLOWED_EMAILS
        sync: false
      - key: AUTH_ALLOWED_EMAIL_DOMAINS
        sync: false
      - key: BOOTSTRAP_OWNER_EMAIL
        sync: false
      - key: BOOTSTRAP_OWNER_PASSWORD
        sync: false
      - key: BOOTSTRAP_OWNER_NAME
        sync: false
      - key: BOOTSTRAP_ORGANIZATION_NAME
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_BASE_URL
        value: https://api.deepseek.com
      - key: DEEPSEEK_MODEL
        value: deepseek-v4-flash
      - key: DEEPSEEK_FAST_MODEL
        sync: false
      - key: DEEPSEEK_CHAT_MODEL
        sync: false
      - key: SILICONFLOW_API_KEY
        sync: false
      - key: SILICONFLOW_BASE_URL
        value: https://api.siliconflow.cn/v1
      - key: SILICONFLOW_MODEL
        value: deepseek-ai/DeepSeek-V3.1
      - key: SILICONFLOW_FAST_MODEL
        value: Qwen/Qwen2.5-7B-Instruct
      - key: SILICONFLOW_CHAT_MODEL
        value: deepseek-ai/DeepSeek-V3.1
      - key: SILICONFLOW_VISION_MODEL
        value: Qwen/Qwen2.5-VL-7B-Instruct
      - key: AI_DEFAULT_TIMEOUT_MS
        value: "20000"
      - key: AI_CHAT_TIMEOUT_MS
        value: "45000"
      - key: FINANCE_AI_PARSE_TIMEOUT_MS
        value: "6500"
      - key: FINANCE_AI_VISION_TIMEOUT_MS
        value: "12000"
      - key: FINANCE_AI_FAST_LOCAL
        value: "true"
      - key: FAL_AI_API_KEY
        sync: false
      - key: FAL_AI_IMAGE_MODEL
        value: fal-ai/flux/schnell
